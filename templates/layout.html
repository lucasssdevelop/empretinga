<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>EmpreTinga</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}?v=1">
</head>

<body>

<header class="topbar">

    <div class="logo-area">

        <div class="logo-box">

        <div class="logo-text">
            <h1>EmpreTinga</h1>
            <span>Conectando pessoas, impulsionando negócios</span>
        </div>

    </div>

    <nav class="menu">
        <a href="/">Início</a>
        <a href="/create" class="btn-primary">Publicar anúncio</a>
    </nav>

</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
